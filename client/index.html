<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6C63FF" />

    <!-- DM Sans — the only font used across the entire template -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <title>UniShop</title>
  <script>
    // Anti-flash: apply saved color mode before React mounts
    (function() {
      try {
        var mode = localStorage.getItem('unishop-color-mode') || 'light';
        var resolved = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        document.documentElement.setAttribute('data-mode', resolved);
        var dark = resolved === 'dark';
        var dim  = resolved === 'dim';
        if (dark || dim) {
          document.documentElement.style.setProperty('--color-background', dark ? '#0F172A' : '#1C1C28');
          document.documentElement.style.setProperty('--color-surface',    dark ? '#1E293B' : '#27273A');
          document.documentElement.style.setProperty('--color-text',       dark ? '#F1F5F9' : '#E2E8F0');
          document.documentElement.style.setProperty('--color-border',     dark ? '#334155' : '#3F3F5A');
          document.documentElement.style.setProperty('--color-text-muted', '#94A3B8');
        }
      } catch(e) {}
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
